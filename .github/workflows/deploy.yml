name: Deploy to GitHub Pages

on:
  # 推到 main 即自動建置並部署
  push:
    branches: [main]
  # 也可在 Actions 頁面手動觸發
  workflow_dispatch:

# 授予 GITHUB_TOKEN 部署 Pages 所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署；新推送會取消進行中的舊部署（但不中斷已完成的）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (typecheck + vite build，base=/mobie/)
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
