<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agent-chat · discussion</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --panel-2: #fbfbfc;
    --ink: #1c2024;
    --ink-soft: #5b626b;
    --ink-faint: #8a909a;
    --line: #e7e9ee;
    --shadow: 0 1px 2px rgba(20,24,31,.06), 0 4px 16px rgba(20,24,31,.05);
    --accent: #2f6fd0;
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1013;
      --panel: #171a1f;
      --panel-2: #1c2026;
      --ink: #e9ecf1;
      --ink-soft: #aab2bd;
      --ink-faint: #727a86;
      --line: #262b33;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 22px rgba(0,0,0,.28);
      --accent: #74a8ff;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 15px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
          "Microsoft JhengHei", "Noto Sans TC", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* ---- header ---- */
  header {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--panel) 86%, transparent);
    backdrop-filter: saturate(160%) blur(12px);
    -webkit-backdrop-filter: saturate(160%) blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px 12px;
  }
  .head-row { display: flex; align-items: center; gap: 12px; max-width: 880px; margin: 0 auto; }
  .head-title {
    font-size: 15px; font-weight: 650; letter-spacing: .01em;
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .head-title .topic { color: var(--ink-soft); font-weight: 500; }
  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12.5px; font-weight: 600; white-space: nowrap;
    padding: 5px 11px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--ink-soft);
    background: var(--panel-2);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-faint); flex: none; }
  .pill.live   { color: #0a7d52; border-color: #b9e6d2; background: #e8f8f1; }
  .pill.live .dot   { background: #15b87f; box-shadow: 0 0 0 0 rgba(21,184,127,.6); animation: pulse 1.8s infinite; }
  .pill.ended  { color: var(--ink-soft); }
  .pill.ended .dot  { background: #98a0ab; }
  .pill.offline{ color: #9a6a12; border-color: #ecd9af; background: #fbf3e1; }
  .pill.offline .dot{ background: #e0a93c; }
  @media (prefers-color-scheme: dark) {
    .pill.live   { color: #46e0a8; border-color: #1d5340; background: #11271f; }
    .pill.offline{ color: #e8c277; border-color: #5a4622; background: #2a2113; }
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(21,184,127,.55); }
    70%  { box-shadow: 0 0 0 7px rgba(21,184,127,0); }
    100% { box-shadow: 0 0 0 0 rgba(21,184,127,0); }
  }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 8px; max-width: 880px; margin: 10px auto 0; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-soft);
    padding: 3px 9px 3px 6px; border-radius: 999px; border: 1px solid var(--line);
  }
  .chip .swatch { width: 9px; height: 9px; border-radius: 50%; }

  /* ---- conversation ---- */
  main {
    flex: 1; overflow-y: auto; scroll-behavior: smooth;
    padding: 22px 16px 96px;
  }
  .thread { max-width: 880px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .topic-banner {
    align-self: stretch; max-width: 100%;
    margin: 2px 0 10px;
    padding: 14px 18px 16px; border-radius: var(--radius);
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--line); box-shadow: var(--shadow);
  }
  .topic-banner .label {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 8px;
  }
  .topic-banner .label::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .topic-banner .text { font-size: 14.5px; color: var(--ink); font-weight: 450; }

  .msg {
    display: grid; grid-template-columns: 38px 1fr; gap: 12px;
    animation: rise .26s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
  .avatar {
    width: 38px; height: 38px; border-radius: 11px;
    display: grid; place-items: center;
    color: #fff; font-weight: 700; font-size: 15px;
    box-shadow: var(--shadow); user-select: none;
  }
  .bubble {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    padding: 10px 14px 11px; box-shadow: var(--shadow);
    min-width: 0;
  }
  .meta { display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; margin-bottom: 3px; }
  .name { font-weight: 680; font-size: 14px; }
  .role {
    font-size: 10.5px; font-weight: 700; letter-spacing: .04em;
    padding: 1px 6px; border-radius: 5px; color: #fff;
  }
  .round {
    font-size: 11.5px; color: var(--ink-faint); font-weight: 600;
    padding: 1px 7px; border-radius: 5px; background: var(--panel-2); border: 1px solid var(--line);
  }
  .time { font-size: 11.5px; color: var(--ink-faint); margin-left: auto; }
  .agree-tag {
    font-size: 11px; font-weight: 700; color: #0a7d52;
    display: inline-flex; align-items: center; gap: 3px;
  }
  @media (prefers-color-scheme: dark) { .agree-tag { color: #46e0a8; } }
  /* ---- rendered markdown content ---- */
  .content { color: var(--ink); line-height: 1.72; word-wrap: break-word; overflow-wrap: anywhere; }
  .content > :first-child { margin-top: 0; }
  .content > :last-child { margin-bottom: 0; }
  .content p { margin: 0 0 10px; }
  .content h1, .content h2, .content h3, .content h4, .content h5, .content h6 {
    margin: 16px 0 8px; line-height: 1.35; font-weight: 680; letter-spacing: .005em;
  }
  .content h1 { font-size: 1.3em; } .content h2 { font-size: 1.18em; }
  .content h3 { font-size: 1.08em; } .content h4, .content h5, .content h6 { font-size: 1em; color: var(--ink-soft); }
  .content ul, .content ol { margin: 7px 0 11px; padding-left: 1.55em; }
  .content li { margin: 4px 0; padding-left: 2px; }
  .content li::marker { color: var(--ink-faint); }
  .content ol > li::marker { font-weight: 650; color: var(--ink-soft); }
  .content li > ul, .content li > ol { margin: 4px 0 2px; }
  .content strong { font-weight: 700; }
  .content em { font-style: italic; }
  .content a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px;
               text-decoration-thickness: 1px; word-break: break-all; }
  .content a:hover { text-decoration-thickness: 2px; }
  .content code {
    font: 12.5px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: var(--panel-2); border: 1px solid var(--line);
    padding: 1px 5px; border-radius: 5px; word-break: break-word;
  }
  .content pre {
    margin: 10px 0; padding: 11px 13px; border-radius: 10px; overflow-x: auto;
    background: var(--panel-2); border: 1px solid var(--line);
  }
  .content pre code {
    display: block; padding: 0; border: none; background: none; font-size: 12.5px; line-height: 1.55;
    white-space: pre; word-break: normal;
  }
  .content blockquote {
    margin: 10px 0; padding: 3px 0 3px 13px; color: var(--ink-soft);
    border-left: 3px solid color-mix(in srgb, var(--accent) 50%, var(--line));
  }
  .content blockquote > :last-child { margin-bottom: 0; }
  .content hr { border: none; border-top: 1px solid var(--line); margin: 14px 0; }
  .content table {
    border-collapse: collapse; margin: 10px 0; font-size: 13.5px; display: block; overflow-x: auto;
  }
  .content th, .content td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; vertical-align: top; }
  .content th { background: var(--panel-2); font-weight: 650; white-space: nowrap; }
  .msg.agree .bubble { border-color: color-mix(in srgb, #15b87f 40%, var(--line)); }

  .end-banner {
    align-self: center; text-align: center;
    margin: 10px 0 4px; padding: 9px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600; color: var(--ink-soft);
    background: var(--panel-2); border: 1px solid var(--line);
  }

  /* ---- final conclusion card ---- */
  .conclusion {
    margin: 6px 0 4px;
    border: 1px solid color-mix(in srgb, var(--accent) 38%, var(--line));
    border-radius: var(--radius);
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--accent) 7%, var(--panel)) 0%, var(--panel) 60%);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .conc-head {
    display: flex; align-items: center; gap: 9px;
    padding: 11px 16px; font-weight: 680; font-size: 14.5px;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--accent) 6%, transparent);
  }
  .conc-badge {
    font-size: 11px; font-weight: 700; letter-spacing: .06em; color: #fff;
    background: var(--accent); padding: 2px 9px; border-radius: 6px;
  }
  .conclusion .content { padding: 14px 16px 16px; }

  /* ---- jump-to-latest ---- */
  .jump {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px; border-radius: 999px; cursor: pointer;
    background: var(--ink); color: var(--bg);
    font-size: 13px; font-weight: 650; border: none;
    box-shadow: 0 6px 20px rgba(0,0,0,.22);
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
  }
  .jump.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; color: var(--ink-faint); margin-top: 16vh; font-size: 14px; }
  .empty .spin {
    width: 22px; height: 22px; margin: 0 auto 12px; border-radius: 50%;
    border: 2.5px solid var(--line); border-top-color: var(--ink-faint);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <header>
    <div class="head-row">
      <div class="head-title">agent-chat · <span class="topic" id="topic">discussion</span></div>
      <span class="pill" id="status"><span class="dot"></span><span id="status-text">connecting…</span></span>
    </div>
    <div class="legend" id="legend"></div>
  </header>

  <main id="main">
    <div class="thread" id="thread">
      <div class="empty" id="empty"><div class="spin"></div>waiting for messages…</div>
    </div>
  </main>

  <button class="jump" id="jump">↓ new <span id="jump-n"></span></button>

<script>
(() => {
  "use strict";

  const AGENTS = {
    claude:  { name: "Claude",  color: "#d97757", role: "host" },
    gemini:  { name: "Gemini",  color: "#4585f4" },
    codex:   { name: "Codex",   color: "#10a37f" },
    mistral: { name: "Mistral", color: "#9b6dff" },
    system:  { name: "System",  color: "#8a8f98" },
  };
  const info = (who) => AGENTS[who] || { name: who, color: "#8a8f98" };

  const qs = new URLSearchParams(location.search);
  // ?file=session-X/conversation.jsonl — the shared server serves a whole base dir,
  // so this selects which session to show (and doubles as a history browser).
  const FILE = qs.get("file") || "conversation.jsonl";
  const META = FILE.replace(/[^/]*$/, "meta.json");  // sibling meta.json of the chosen file
  const POLL_MS = 1500;

  const $thread = document.getElementById("thread");
  const $empty  = document.getElementById("empty");
  const $topic  = document.getElementById("topic");
  const $legend = document.getElementById("legend");
  const $status = document.getElementById("status");
  const $statusText = document.getElementById("status-text");
  const $main   = document.getElementById("main");
  const $jump   = document.getElementById("jump");
  const $jumpN  = document.getElementById("jump-n");

  let lastSeq = 0;
  let ended = false;
  let endGrace = 3;          // after `ended`, poll a few more times to catch a late conclusion
  let maxRounds = null;
  let curRound = 0;
  let unseen = 0;
  let everLive = false;
  let seenAgents = new Set();

  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  // ---- a small, dependency-free Markdown -> HTML renderer ----
  // Inline rules run on already-escaped text; code spans are pulled out first so
  // their contents are never touched by bold/italic/link rules.
  function inlineMd(t) {
    const codes = [];
    t = t.replace(/`([^`]+)`/g, (_, c) => {
      codes.push(c); return "" + (codes.length - 1) + "";
    });
    t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    t = t.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    t = t.replace(/__([^_]+)__/g, "<strong>$1</strong>");
    t = t.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
    t = t.replace(/(^|[\s(])_([^_\n]+)_(?=[\s).,!?;]|$)/g, "$1<em>$2</em>");
    t = t.replace(/(\d+)/g, (_, k) => "<code>" + codes[+k] + "</code>");
    return t;
  }

  const RE_ITEM = /^(\s*)([-*+]|\d+[.)])\s+(.*)$/;
  const indentOf = (s) => (s.match(/^\s*/) || [""])[0].length;

  function parseList(lines, start) {
    let i = start;
    const base = indentOf(lines[i]);
    const ordered = /^\s*\d+[.)]\s+/.test(lines[i]);
    const items = [];
    while (i < lines.length) {
      if (lines[i].trim() === "") {            // blank: continue only if a same-level item follows (loose list)
        let j = i + 1;
        while (j < lines.length && lines[j].trim() === "") j++;
        if (j < lines.length && RE_ITEM.test(lines[j]) && indentOf(lines[j]) === base) { i = j; continue; }
        break;
      }
      const m = lines[i].match(RE_ITEM);
      if (!m) break;
      const indent = m[1].length;
      if (indent < base) break;
      if (indent > base) {                     // deeper item -> nested list under the previous <li>
        const [sub, ni] = parseList(lines, i);
        if (items.length) items[items.length - 1] = items[items.length - 1].replace(/<\/li>$/, sub + "</li>");
        i = ni; continue;
      }
      let content = inlineMd(esc(m[3]));
      i++;
      while (i < lines.length && lines[i].trim() !== "" && !RE_ITEM.test(lines[i]) && indentOf(lines[i]) > base) {
        content += " " + inlineMd(esc(lines[i].trim())); i++;  // wrapped continuation line
      }
      items.push("<li>" + content + "</li>");
    }
    const tag = ordered ? "ol" : "ul";
    return ["<" + tag + ">" + items.join("") + "</" + tag + ">", i];
  }

  function tryTable(lines, i) {
    if (lines[i].indexOf("|") === -1) return null;
    const sep = lines[i + 1];
    if (sep == null || !/-/.test(sep) || !/^\s*\|?[\s:|-]+\|?\s*$/.test(sep)) return null;
    const cells = (r) => r.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map((c) => c.trim());
    const heads = cells(lines[i]);
    let j = i + 2; const rows = [];
    while (j < lines.length && lines[j].indexOf("|") !== -1 && lines[j].trim() !== "") { rows.push(cells(lines[j])); j++; }
    let html = "<table><thead><tr>" + heads.map((h) => "<th>" + inlineMd(esc(h)) + "</th>").join("") + "</tr></thead>";
    if (rows.length) html += "<tbody>" + rows.map((r) =>
      "<tr>" + r.map((c) => "<td>" + inlineMd(esc(c)) + "</td>").join("") + "</tr>").join("") + "</tbody>";
    return [html + "</table>", j];
  }

  function renderMarkdown(src) {
    const lines = String(src == null ? "" : src).replace(/\r\n?/g, "\n").split("\n");
    const out = [];
    let i = 0; const n = lines.length;
    while (i < n) {
      const line = lines[i];
      const fence = line.match(/^\s*(`{3,}|~{3,})(.*)$/);
      if (fence) {
        const mark = fence[1][0], len = fence[1].length;
        const close = new RegExp("^\\s*\\" + mark + "{" + len + ",}\\s*$");
        i++; const buf = [];
        while (i < n && !close.test(lines[i])) { buf.push(lines[i]); i++; }
        i++;
        out.push("<pre><code>" + esc(buf.join("\n")) + "</code></pre>");
        continue;
      }
      const h = line.match(/^(#{1,6})\s+(.*)$/);
      if (h) { const l = h[1].length; out.push("<h" + l + ">" + inlineMd(esc(h[2].trim())) + "</h" + l + ">"); i++; continue; }
      if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)) { out.push("<hr>"); i++; continue; }
      if (/^\s*>\s?/.test(line)) {
        const buf = [];
        while (i < n && /^\s*>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, "")); i++; }
        out.push("<blockquote>" + renderMarkdown(buf.join("\n")) + "</blockquote>");
        continue;
      }
      const tbl = tryTable(lines, i);
      if (tbl) { out.push(tbl[0]); i = tbl[1]; continue; }
      if (RE_ITEM.test(line)) { const [html, ni] = parseList(lines, i); out.push(html); i = ni; continue; }
      if (line.trim() === "") { i++; continue; }
      const buf = [];
      while (i < n && lines[i].trim() !== ""
             && !/^(#{1,6})\s/.test(lines[i]) && !/^\s*>/.test(lines[i])
             && !/^\s*(`{3,}|~{3,})/.test(lines[i]) && !RE_ITEM.test(lines[i])
             && !/^\s*([-*_])(\s*\1){2,}\s*$/.test(lines[i])) { buf.push(lines[i]); i++; }
      if (buf.length) out.push("<p>" + inlineMd(esc(buf.join("\n"))).replace(/\n/g, "<br>") + "</p>");
    }
    return out.join("");
  }

  const hhmm = (ts) => {
    const d = new Date(ts);
    if (isNaN(d)) return "";
    return d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false });
  };

  const nearBottom = () =>
    ($main.scrollHeight - $main.scrollTop - $main.clientHeight) < 90;
  const toBottom = () => { $main.scrollTop = $main.scrollHeight; };

  function setStatus(kind, text) {
    $status.className = "pill " + kind;
    $statusText.textContent = text;
  }

  function legend() {
    $legend.innerHTML = "";
    for (const who of seenAgents) {
      const a = info(who);
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.innerHTML = `<span class="swatch" style="background:${a.color}"></span>${a.name}` +
        (a.role ? ` · ${a.role}` : "");
      $legend.appendChild(chip);
    }
  }

  function addTopic(text) {
    const el = document.createElement("div");
    el.className = "topic-banner";
    // render the topic with the same markdown engine as messages (inline only — a
    // topic is one logical line), so `code`, **bold**, links etc. don't show raw
    el.innerHTML = `<div class="label">Topic</div><div class="text content">${inlineMd(esc(text))}</div>`;
    $thread.appendChild(el);
    $topic.textContent = text.length > 42 ? text.slice(0, 42) + "…" : text;
  }

  function addMessage(m) {
    const a = info(m.from);
    if (!seenAgents.has(m.from)) { seenAgents.add(m.from); legend(); }
    if (typeof m.round === "number" && m.round > curRound) curRound = m.round;

    const el = document.createElement("div");
    el.className = "msg" + (m.type === "agree" ? " agree" : "");

    const avatar = `<div class="avatar" style="background:${a.color}">${a.name[0]}</div>`;
    const role = a.role ? `<span class="role" style="background:${a.color}">${a.role}</span>` : "";
    const round = (m.round >= 1) ? `<span class="round">round ${m.round}</span>` : "";
    const agree = (m.type === "agree") ? `<span class="agree-tag">✓ agree</span>` : "";
    const time = m.ts ? `<span class="time">${hhmm(m.ts)}</span>` : "";

    el.innerHTML = avatar + `<div class="bubble">
      <div class="meta"><span class="name" style="color:${a.color}">${a.name}</span>${role}${round}${agree}${time}</div>
      <div class="content">${renderMarkdown(m.content)}</div>
    </div>`;
    $thread.appendChild(el);
  }

  function addEndBanner(text) {
    const el = document.createElement("div");
    el.className = "end-banner";
    el.textContent = "— " + (text || "discussion ended") + " —";
    $thread.appendChild(el);
  }

  function addConclusion(m) {
    const el = document.createElement("div");
    el.className = "conclusion";
    el.innerHTML = `<div class="conc-head"><span class="conc-badge">SUMMARY</span>Final summary</div>` +
      `<div class="content">${renderMarkdown(m.content)}</div>`;
    $thread.appendChild(el);
  }

  function liveStatus() {
    if (ended) return;
    const r = maxRounds ? `round ${curRound}/${maxRounds}` : `round ${curRound}`;
    setStatus("live", `live · ${r}`);
  }

  function ingest(messages) {
    if (!messages.length) return;
    if ($empty) { $empty.remove(); }
    const stick = nearBottom();
    let added = 0;

    for (const m of messages) {
      if (m.seq <= lastSeq) continue;
      lastSeq = m.seq;
      if (m.type === "system") { addTopic(String(m.content ?? "")); continue; }
      if (m.type === "conclusion") { addConclusion(m); added++; continue; }
      if (m.type === "control") {
        ended = true;
        const reason = String(m.content ?? "");
        addEndBanner(reason.includes("consensus") ? "consensus · discussion ended"
                   : reason.includes("max_rounds") ? "round limit reached · discussion ended"
                   : "discussion ended");
        continue;
      }
      addMessage(m);
      added++;
    }

    if (ended) {
      setStatus("ended", "ended");
    } else {
      liveStatus();
    }

    if (stick) {
      toBottom();
      unseen = 0; $jump.classList.remove("show");
    } else if (added) {
      unseen += added;
      $jumpN.textContent = `(${unseen})`;
      $jump.classList.add("show");
    }
  }

  async function loadMeta() {
    try {
      const r = await fetch(META, { cache: "no-store" });
      if (!r.ok) return;
      const meta = await r.json();
      if (meta.topic) { addTopic(meta.topic); lastSeqTopicLoaded = true; }
      if (meta.max_rounds) maxRounds = meta.max_rounds;
      if (Array.isArray(meta.order)) meta.order.forEach((x) => { seenAgents.add(x); });
      legend();
    } catch (_) { /* meta is optional; topic also arrives via the system line */ }
  }
  let lastSeqTopicLoaded = false;

  function parseJsonl(text) {
    const out = [];
    for (const line of text.split("\n")) {
      const s = line.trim();
      if (!s) continue;
      try { out.push(JSON.parse(s)); } catch (_) { /* skip partial trailing line */ }
    }
    return out;
  }

  async function poll() {
    try {
      const r = await fetch(FILE + "?_=" + Date.now(), { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      everLive = true;
      const msgs = parseJsonl(await r.text());
      // meta.json may have pre-seeded the topic banner; avoid a duplicate
      const filtered = lastSeqTopicLoaded ? msgs.filter((m) => m.type !== "system") : msgs;
      if (lastSeqTopicLoaded && msgs.length && lastSeq === 0) {
        // mark the system seq as consumed so its content isn't shown twice
        const sys = msgs.find((m) => m.type === "system");
        if (sys) lastSeq = Math.max(lastSeq, sys.seq);
      }
      ingest(filtered);
    } catch (e) {
      if (everLive && !ended) {
        setStatus("offline", "idle");
        $jump.classList.remove("show");
      }
    }
    if (!ended) setTimeout(poll, POLL_MS);
    else if (endGrace-- > 0) setTimeout(poll, POLL_MS);  // a few extra polls catch a late-appended conclusion
  }

  $jump.addEventListener("click", () => {
    toBottom(); unseen = 0; $jump.classList.remove("show");
  });
  $main.addEventListener("scroll", () => {
    if (nearBottom()) { unseen = 0; $jump.classList.remove("show"); }
  });

  (async () => {
    await loadMeta();
    poll();
  })();
})();
</script>
</body>
</html>
